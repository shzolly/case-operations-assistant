name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Run backend tests
        env:
          RAG_BACKEND: local
        run: |
          python -m pytest \
            tests/test_langgraph_workflow.py \
            tests/test_workflow.py \
            tests/test_retrieval.py \
            tests/test_vector_store.py \
            tests/test_rag_evaluation.py \
            tests/test_api_contract.py \
            tests/test_postgres_config.py \
            tests/test_production_rag_config.py

      - name: Run smoke scripts
        env:
          RAG_BACKEND: local
        run: |
          python tests/smoke_test.py
          python tests/storage_lifecycle_test.py
          python tests/http_smoke_test.py
          python tests/frontend_contract_test.py

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build
    steps:
      - uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t judiciary-ai-backend:${{ github.sha }} .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t judiciary-ai-frontend:${{ github.sha }} frontend
