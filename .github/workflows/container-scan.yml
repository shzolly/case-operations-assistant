name: Container Scan

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t judiciary-ai-backend:scan .

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: judiciary-ai-backend:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t judiciary-ai-frontend:scan frontend

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: judiciary-ai-frontend:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

