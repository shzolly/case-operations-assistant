name: Container Scan

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t judiciary-ai-backend:scan .

      - name: Scan backend image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$HOME/.cache/trivy:/root/.cache/" \
            aquasec/trivy:0.69.3 image \
            --scanners vuln \
            --format table \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            judiciary-ai-backend:scan

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t judiciary-ai-frontend:scan frontend

      - name: Scan frontend image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$HOME/.cache/trivy:/root/.cache/" \
            aquasec/trivy:0.69.3 image \
            --scanners vuln \
            --format table \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            judiciary-ai-frontend:scan
