services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: judiciary_ai
      POSTGRES_USER: judiciary
      POSTGRES_PASSWORD: judiciary_dev
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      RAG_BACKEND: pgvector
      DATABASE_URL: postgresql://judiciary:judiciary_dev@postgres:5432/judiciary_ai
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      OPENAI_EMBEDDING_DIMENSIONS: "1536"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgvector_data:
